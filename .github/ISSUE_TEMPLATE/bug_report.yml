name: Bug report
description: Report something broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OpenMUX. Please include enough detail for maintainers to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open ...
        2. Run ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What OpenMUX version, branch, or commit are you using?
      placeholder: "v0.1.0, main, or commit SHA"

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant system, terminal, shell, and hardware details.
      placeholder: |
        macOS:
        Terminal/shell:
        Keyboard layout:
        Input method/IME:
        Hardware:

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Paste logs, crash output, screenshots, or recordings if available.
      render: shell

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that may help diagnose the issue.
