name: Feature request
description: Suggest an idea or improvement for OpenMUX
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please focus on the developer terminal workspace use case.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem, limitation, or workflow gap would this solve?
      placeholder: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like OpenMUX to do?
      placeholder: Describe the feature or behavior you want.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of OpenMUX does this affect most?
      options:
        - Terminal fidelity
        - Keyboard/input handling
        - Workspace/session model
        - CLI/RPC
        - Hooks/extensions
        - Performance
        - Packaging/distribution
        - Documentation
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds have you considered?

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, examples, links, or related issues.
